name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build site
        run: |
          node scripts/extract.mjs
          node scripts/build-site.mjs
          npx -y pagefind --site dist
      - name: Refresh premium archive data in Supabase storage
        run: |
          curl -sf -X POST "https://jnouvwxomrcffqwilqkq.supabase.co/storage/v1/object/archive-premium/premium.json" \
            -H "Authorization: Bearer $SERVICE_KEY" -H "x-upsert: true" \
            -H "content-type: application/json" --data-binary @data/premium.json
        env:
          SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
